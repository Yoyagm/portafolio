# Lighthouse CI config (T23, RNF1.4, RNF6.3)
# Doble run: 3D forzado (real) + camino degradado (reduced-motion).
ci:
  collect:
    numberOfRuns: 2
    url:
      # Run normal (3D activo si GPU disponible)
      - "http://localhost:3000/en"
      # Run con reduced-motion (degrada a póster)
      - "http://localhost:3000/en"
    settings:
      - {}
      - emulatedUserAgent: "Mozilla/5.0 (prefers-reduced-motion: reduce)"
    # Servidor iniciado antes de lhci autorun (pnpm build && pnpm start en CI)
    startServerReadyPattern: "Ready"
    startServerTimeout: 60000

  assert:
    preset: "lighthouse:no-pwa"
    assertions:
      # Rendimiento y calidad ≥ 90 (RNF1.4)
      "categories:performance": ["error", { "minScore": 0.9 }]
      "categories:accessibility": ["error", { "minScore": 0.9 }]
      "categories:best-practices": ["error", { "minScore": 0.9 }]
      "categories:seo": ["error", { "minScore": 0.9 }]
      # TBT ≤ 200ms (diseño)
      "total-blocking-time": ["warn", { "maxNumericValue": 200 }]
      # No usar eval ni Function (CSP)
      "no-document-write": "error"

  upload:
    target: filesystem
    outputDir: .lighthouseci
    reportFilenamePattern: "%%PATHNAME%%-%%DATETIME%%-report.%%EXTENSION%%"
