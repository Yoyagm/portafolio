version: 2
updates:
  # npm/pnpm: actualizaciones semanales, bloquea major semver
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 10
    # Agrupa todas las actualizaciones de patch/minor en un único PR
    groups:
      non-major:
        update-types:
          - minor
          - patch
    # Bloquea major bumps automaticamente (requieren revisión manual)
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Bogota"
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
