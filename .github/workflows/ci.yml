name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  # Se inyectan como secretos en el repo; si no existen, los pasos de build los ignoran
  # Los tests de unidad no los necesitan; los E2E usan el build local
  NEXT_PUBLIC_SITE_URL: "https://portafolio.vercel.app"

jobs:
  # ── 1. Calidad estática ──────────────────────────────────────────────────────
  quality:
    name: "TypeScript · ESLint · Prettier · Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript — noEmit
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm exec eslint . --max-warnings 0

      - name: Prettier — check
        run: pnpm exec prettier --check "src/**/*.{ts,tsx}" ".github/**/*.yml"

      - name: pnpm audit (prod, high+)
        run: pnpm audit --prod --audit-level=high

  # ── 2. Build + size-limit ────────────────────────────────────────────────────
  build:
    name: "Build · size-limit"
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # En CI sin secretos reales, build no llama a servicios externos
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'ci-placeholder' }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL || 'ci@example.com' }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL || 'https://ci.upstash.io' }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN || 'ci-placeholder' }}

      - name: size-limit
        run: pnpm exec size-limit --json

  # ── 3. Tests (unit + E2E) ────────────────────────────────────────────────────
  test:
    name: "Playwright — unit + E2E"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Unit tests
        run: pnpm run test:unit

      - name: Build (para E2E)
        run: pnpm build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'ci-placeholder' }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL || 'ci@example.com' }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL || 'https://ci.upstash.io' }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN || 'ci-placeholder' }}

      - name: E2E tests
        run: pnpm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── 4. Lighthouse CI (doble run) ─────────────────────────────────────────────
  lighthouse:
    name: "Lighthouse CI"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'ci-placeholder' }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL || 'ci@example.com' }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL || 'https://ci.upstash.io' }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN || 'ci-placeholder' }}

      - name: Start server
        run: pnpm start &
        env:
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000/en --timeout 30000

      - name: Lighthouse CI — doble run
        run: pnpm exec lhci autorun --config=.lighthouserc.yml
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload LHCI report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lhci-reports
          path: .lighthouseci/
          retention-days: 14
